<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container align-items-center">
    <a class="navbar-brand envoltura-marca" routerLink="/">
      <div class="contenedor-logo">
        <img src="assets/images/LogoTienda.png" alt="Portatek Logo" class="logo-imagen">
      </div>
      <span class="texto-marca">Portatek</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">{{ 'nav.inicio' | translate }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link cursor-pointer" onclick="toggleSidebar()">{{ 'nav.productos' | translate }}</a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn()">
          <a class="nav-link" routerLink="/facturas">{{ 'nav.facturas' | translate }}</a>
        </li>
        <li class="nav-item" *ngIf="isAdmin()">
          <a class="nav-link" routerLink="/admin/productos">{{ 'nav.adminProductos' | translate }}</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-2">
          <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
              {{ currentLang.toUpperCase() }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" (click)="setLanguage('es')">Español</a></li>
              <li><a class="dropdown-item" (click)="setLanguage('en')">English</a></li>
            </ul>
          </div>
        </li>
        <li class="nav-item me-3">
          <a class="nav-link position-relative" routerLink="/cart">
            <i class="bi bi-cart3"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              *ngIf="cartItemCount > 0">
              {{ cartItemCount }}
            </span>
          </a>
        </li>
        <li class="nav-item" *ngIf="!isLoggedIn()">
          <a class="nav-link" routerLink="/login">{{ 'nav.iniciarSesion' | translate }}</a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn()">
          <span class="nav-link text-white me-3">Hola, {{ username }}</span>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn()">
          <button class="btn btn-outline-light btn-sm" (click)="logout()">{{ 'nav.cerrarSesion' | translate }}</button>
        </li>
      </ul>
    </div>
  </div>
</nav>
