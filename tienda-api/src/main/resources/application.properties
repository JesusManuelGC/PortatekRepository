spring.application.name=tienda-api
server.port=5000

# Datasource Configuration
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/ProyectoBD}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Security and JWT
jwt.secret=${JWT_SECRET:very_secret_key_for_jwt_auth_in_this_project_at_least_32_characters}
jwt.expiration=86400000

# File Upload
file.upload-dir=${UPLOAD_PATH:uploads}

# Logging
logging.level.org.springframework.security=DEBUG

# GitHub OAuth2
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
